; Recommended PHP-FPM/Apache OPcache settings for Hostinger Business shared hosting
; Place in hPanel > PHP Configuration > Custom php.ini, or merge into a .user.ini
; in public_html/api/. Restart PHP from hPanel after changes.

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=2
opcache.fast_shutdown=1
opcache.save_comments=1
opcache.jit_buffer_size=64M
opcache.jit=tracing

realpath_cache_size=4M
realpath_cache_ttl=600

memory_limit=256M
post_max_size=12M
upload_max_filesize=10M
max_execution_time=60

; PHP 8.2+ hardening
expose_php=Off
session.cookie_secure=1
session.cookie_httponly=1
session.cookie_samesite=Lax
