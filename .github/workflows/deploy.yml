name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.HOSTINGER_SSH_PORT }} -H ${{ secrets.HOSTINGER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync built frontend to public_html
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.HOSTINGER_SSH_PORT }} -o StrictHostKeyChecking=accept-new" \
            --exclude '_api.php' \
            --exclude '.htaccess' \
            --exclude 'uploads' \
            frontend/dist/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/renarvo.com/public_html/

      - name: Run remote deploy.sh (composer / migrate / cache / OPcache reset)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd "$HOME/renarvo"
            git fetch --all --prune
            git reset --hard origin/main
            bash deploy/deploy.sh

      - name: Smoke test
        run: |
          set -e
          for path in /api/v1/health /api/v1/cities /; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://renarvo.com${path}")
            echo "GET ${path} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error ::Smoke test failed for ${path}"
              exit 1
            fi
          done
