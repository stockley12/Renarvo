name: Build verify

# Hostinger blocks inbound SSH from GitHub Actions runner IPs, so the actual
# deploy step runs on the server (via Hostinger hPanel Git auto-deploy +
# `bash deploy/deploy.sh`). This workflow just guards `main` from breaking
# builds: it installs deps and builds the frontend in CI to catch issues
# before the Hostinger pull happens.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-verify
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend (verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api/v1
        run: npm run build

      - name: Smoke-test live site
        run: |
          set -e
          for path in /api/v1/health /api/v1/cities /; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://renarvo.com${path}" || echo 000)
            echo "GET ${path} -> ${code}"
          done
